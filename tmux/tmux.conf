# ─── General ──────────────────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # true color support

set -g history-limit 10000
set -sg escape-time 0           # no delay for escape key (important for nvim)
set -g focus-events on          # pass focus events through to apps (nvim, etc.)
set -g base-index 1             # start windows at 1 not 0
setw -g pane-base-index 1       # start panes at 1 not 0
set -g renumber-windows on      # renumber windows when one is closed

# ─── Prefix ───────────────────────────────────────────────────────────────────

unbind C-b
set -g prefix C-a
bind C-a send-prefix            # C-a C-a sends literal C-a to the shell

# ─── Mouse ────────────────────────────────────────────────────────────────────

set -g mouse on

# ─── Pane splitting ───────────────────────────────────────────────────────────

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in the current path
bind c new-window -c "#{pane_current_path}"

# ─── Pane navigation (vim-style) ──────────────────────────────────────────────

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Copy mode (vi) ───────────────────────────────────────────────────────────

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ─── Status bar ───────────────────────────────────────────────────────────────

set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left  "#[fg=#89b4fa,bold] #S #[fg=#585b70]│ "
set -g status-right "#[fg=#585b70]│ #[fg=#a6e3a1]#H #[fg=#585b70]│ #[fg=#cdd6f4]%Y-%m-%d %H:%M"

# Window tabs
setw -g window-status-format         "#[fg=#585b70] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold,bg=#313244] #I:#W "

# ─── Pane borders ─────────────────────────────────────────────────────────────

set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ─── Reload config ────────────────────────────────────────────────────────────

bind r source-file ~/.tmux.conf \; display "Config reloaded"
